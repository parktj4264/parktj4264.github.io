<script>
  document.addEventListener("DOMContentLoaded", function() {
    let path = window.location.pathname;
    
    // Determine the logical active section
    let isHome = path === '/' || (path.endsWith('/index.html') && !path.includes('/posts/'));
    let isPosts = path.includes('/posts.html') || path.includes('/posts/');
    let isAbout = path.includes('/about.html');
    
    const navLinks = document.querySelectorAll('.navbar-nav .nav-link');
    navLinks.forEach(link => {
      let text = link.textContent.trim();
      link.classList.remove('active');
      if (text === 'Home' && isHome) link.classList.add('active');
      if (text === 'Posts' && isPosts) link.classList.add('active');
      if (text === 'About' && isAbout) link.classList.add('active');
    });

    const sidebarItems = document.querySelectorAll('.quarto-sidebar .sidebar-item');
    sidebarItems.forEach(li => {
       li.classList.remove('active');
       let text = li.textContent.trim();
       if (text === 'Home' && isHome) li.classList.add('active');
       if (text === 'Posts' && isPosts) li.classList.add('active');
       if (text === 'About' && isAbout) li.classList.add('active');
       
       let a = li.querySelector('a, span.sidebar-item-text');
       if (a) {
           if (li.classList.contains('active')) {
               a.style.color = '#3498db';
               a.style.fontWeight = 'bold';
           } else {
               a.style.color = '';
               a.style.fontWeight = '';
           }
       }
    });
  });
</script>
